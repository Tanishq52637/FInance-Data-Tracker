<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Finance Tracker</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>

<body>

    <h2 class="sr-only">
        Personal Finance Tracker — manage expenses, budgets, loans, and get financial suggestions
    </h2>

    <nav class="nav">
        <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
        <button class="nav-btn" onclick="showPage('add')">Add Expense</button>
        <button class="nav-btn" onclick="showPage('budget')">Budget</button>
        <button class="nav-btn" onclick="showPage('loans')">Loans</button>
        <button class="nav-btn" onclick="showPage('suggestions')">Suggestions</button>
        <button class="nav-btn" onclick="showPage('records')">Records</button>
    </nav>

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
        <div class="metric-grid" id="metric-grid"></div>

        <div class="row">

            <div class="card">
                <div class="card-title">Spending by category</div>
                <div style="position:relative;height:220px">
                    <canvas id="donutChart"></canvas>
                </div>
                <div class="legend" id="donut-legend"></div>
            </div>

            <div class="card">
                <div class="card-title">Monthly trend</div>
                <div style="position:relative;height:220px">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

        </div>

        <div class="card" id="dash-suggestions"></div>
    </div>

    <!-- ADD EXPENSE -->
    <div id="page-add" class="page">

        <div class="card">

            <div class="card-title">New transaction</div>

            <label>Description</label>
            <input type="text" id="exp-desc">

            <label>Amount (₹)</label>
            <input type="number" id="exp-amount">

            <label>Category</label>
            <select id="exp-cat">
                <option value="rent">Rent</option>
                <option value="education">Education</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="utilities">Utilities</option>
                <option value="health">Health</option>
                <option value="entertainment">Entertainment</option>
                <option value="savings">Savings</option>
                <option value="investment">Investment</option>
                <option value="other">Other</option>
            </select>

            <label>Date</label>
            <input type="date" id="exp-date">

            <label>Notes</label>
            <input type="text" id="exp-notes">

            <button class="btn-primary" onclick="addExpense()">
                Add transaction
            </button>

        </div>

        <div class="card">

            <div class="card-title">Monthly income</div>

            <label>Income</label>
            <input type="number" id="income-input">

            <button class="btn-primary" onclick="saveIncome()">
                Save income
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
